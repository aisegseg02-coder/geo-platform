services:
  - type: web
    name: geo-platform
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn server.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OUTPUT_DIR
        value: /tmp/geo-output
      - key: PYTHON_VERSION
        value: 3.12.0
